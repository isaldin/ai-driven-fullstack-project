name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test · build · e2e
    runs-on: ubuntu-latest

    # Postgres for the backend e2e step. The e2e global-setup creates the
    # database and pushes the ZenStack schema, so no migration step is needed.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm@11 from packageManager field)
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ZenStack client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (biome)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Backend e2e tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_e2e
        run: pnpm --filter @app/backend test:e2e
