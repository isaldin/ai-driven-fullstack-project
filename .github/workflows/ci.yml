name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo (test/build/e2e). Override
# per-job if a future job needs more (e.g. security-events: write to upload SARIF).
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test · build · e2e
    runs-on: ubuntu-latest

    # Postgres for the backend e2e step. The e2e global-setup creates the
    # database and pushes the ZenStack schema, so no migration step is needed.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # corepack + Node 22 (pnpm store cache) + frozen install + db:generate.
      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          generate: 'true'

      # Persist Turbo's local task cache across runs so unchanged
      # typecheck/test/build tasks are restored instead of recomputed. Parallel
      # jobs don't share within a run (cache saves at job end) — the win is
      # run-to-run. actions/cache failures are non-fatal (warn on self-hosted
      # runners without a cache backend), so this never breaks the job.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-ci-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-ci-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (biome)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Backend e2e tests
        # `localhost` is correct on GitHub-hosted runners: the job runs directly on
        # the VM and the postgres service is port-mapped to localhost. On container-
        # based runners (self-hosted Gitea act_runner / nektos `act`) the job runs in
        # a container and the service is a sibling reachable by name — set a repo/org
        # Actions variable E2E_DB_HOST=postgres there.
        env:
          DATABASE_URL: postgresql://postgres:postgres@${{ vars.E2E_DB_HOST || 'localhost' }}:5432/app_e2e
        run: pnpm --filter @app/backend test:e2e

  # Frontend e2e: Playwright drives a real browser against the built stack
  # (backend dist + Vite dev server) on dedicated ports, using an isolated
  # `app_e2e_web` database that its globalSetup creates, pushes and seeds.
  e2e-web:
    name: frontend e2e (playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No db:generate: the `build` step below runs it via Turbo's task graph.
      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-web-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-web-
            turbo-${{ runner.os }}-

      # Builds everything (turbo runs db:generate first). The e2e boots the
      # backend from dist, so it must be built before Playwright starts it.
      - name: Build
        run: pnpm build

      # Cache the browser binary so it isn't re-downloaded each run. `playwright
      # install` skips the download when the binary is already present; only the
      # (fast, mostly-preinstalled) apt deps still run. Key on the lockfile so a
      # Playwright version bump busts it. Cache miss on self-hosted runners just
      # re-downloads — safe.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: pnpm --filter @app/frontend exec playwright install --with-deps chromium

      - name: Frontend e2e tests
        # Host caveat (same as backend e2e): `localhost` on GitHub-hosted runners,
        # `postgres` on container-based self-hosted runners (set E2E_DB_HOST=postgres).
        # PW_CHROMIUM_NO_SANDBOX: leave unset on GitHub-hosted (non-root, sandbox works);
        # set it to 1 on rootful container runners or Chromium refuses to launch.
        env:
          CI: 'true'
          E2E_DB_HOST: ${{ vars.E2E_DB_HOST || 'localhost' }}
          PW_CHROMIUM_NO_SANDBOX: ${{ vars.PW_CHROMIUM_NO_SANDBOX || '' }}
        run: pnpm --filter @app/frontend test:e2e

      - name: Upload Playwright report
        # A debugging convenience, not a gate — never fail CI over it. Also lets the
        # local Gitea harness stay green: Gitea (GHES) doesn't support the v4 artifact API.
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # Build the deployable images so a broken Dockerfile / base-image CVE is caught
  # in CI, not at deploy time. Images are built (not pushed) and scanned with Trivy.
  # One matrix leg per image runs build + scan in parallel on its own runner.
  docker-images:
    name: build + scan ${{ matrix.name }} (trivy)
    runs-on: ubuntu-latest

    # security-events: write lets Trivy findings land in the Security tab (SARIF
    # upload), scoped to this job. A job-level permissions block replaces the
    # top-level one wholesale, so contents: read is re-declared for checkout.
    permissions:
      contents: read
      security-events: write

    strategy:
      # One image's build/scan failing must not cancel the other legs.
      fail-fast: false
      matrix:
        include:
          - name: backend
            file: infra/docker/Dockerfile.backend
          - name: frontend
            file: infra/docker/Dockerfile.frontend
            build-args: VITE_API_URL=http://localhost:3000
          - name: telegram-bot
            file: infra/docker/Dockerfile.bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # No external build cache (cache-from/to) so this runs identically on
      # GitHub-hosted and container-based self-hosted runners; `load: true` puts
      # the image in the local daemon so Trivy can scan it.
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: app-${{ matrix.name }}:ci
          build-args: ${{ matrix.build-args }}

      # Advisory, non-gating (exit-code 0 + continue-on-error): print HIGH/CRITICAL
      # fixable CVEs to the logs without blocking merges on base-image drift.
      # Third-party action pinned to a full commit SHA (supply-chain hardening).
      - name: Scan ${{ matrix.name }} image (Trivy · table)
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: app-${{ matrix.name }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: table

      # Same scan as SARIF so findings are trackable in the Security tab over time,
      # not just buried in logs. Non-gating.
      - name: Scan ${{ matrix.name }} image (Trivy · SARIF)
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: app-${{ matrix.name }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy-${{ matrix.name }}.sarif

      - name: Upload Trivy SARIF to code scanning
        # Visibility convenience, never a gate. Also keeps the local Gitea harness
        # green: Gitea (GHES) doesn't implement the code-scanning upload API.
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
