name: Security rescan

# Scheduled defence against "green when merged, vulnerable next week": re-audits
# dependencies, re-scans the built images, and re-validates the exception policy
# on a fixed cadence — independent of code changes. A newly-disclosed advisory in
# an unchanged dependency turns this red and notifies via a tracking issue.
on:
  schedule:
    # Every Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: dependency + exception rescan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup workspace
        uses: ./.github/actions/setup
      # Expiry is time-based, so an exception that was valid at merge time can be
      # expired now — this re-check catches that.
      - name: Validate security exceptions
        run: node scripts/check-security-exceptions.mjs
      - name: Audit production dependencies (>= high)
        run: node scripts/audit-ci.mjs

  images:
    name: image rescan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            file: infra/docker/Dockerfile.backend
          - name: frontend
            file: infra/docker/Dockerfile.frontend
            build-args: VITE_API_URL=http://localhost:3000
          - name: telegram-bot
            file: infra/docker/Dockerfile.bot
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup workspace
        uses: ./.github/actions/setup
      - name: Generate .trivyignore from active exceptions
        run: node scripts/check-security-exceptions.mjs --write-trivyignore
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: app-${{ matrix.name }}:scan
          build-args: ${{ matrix.build-args }}
      - name: Scan ${{ matrix.name }} image (Trivy · gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: app-${{ matrix.name }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          trivyignores: .trivyignore

  notify:
    name: open tracking issue on failure
    runs-on: ubuntu-latest
    needs: [audit, images]
    if: ${{ failure() }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: File / update a security-rescan issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Scheduled security rescan failed"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)"
          body="The weekly security rescan failed. A dependency or image likely picked up a newly-disclosed advisory, or an exception expired.\n\nRun: ${RUN_URL}\n\nTriage per docs/runbooks/VULNERABILITY_RESPONSE.md."
          if [ -n "${existing:-}" ]; then
            printf '%b' "$body" | gh issue comment "$existing" --body-file -
          else
            printf '%b' "$body" | gh issue create --title "$title" --label security --body-file -
          fi
