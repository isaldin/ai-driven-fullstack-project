---
# ─────────────────────────────────────────────────────────────
# VPS deployment playbook — deploy immutable image DIGESTS built + signed in CI.
#
#   pnpm deploy:vps
#     -> ansible-playbook -i infra/ansible/inventory.ini infra/ansible/deploy.yml
#
# The VPS never runs `git clone` or `docker compose build`: Ansible COPIES the
# compose/config files from the control node and `docker compose pull`s the exact
# digests recorded in group_vars (backend_image/frontend_image/bot_image). Rollback
# = re-run with the previous release's digests (see docs/runbooks/ROLLBACK.md).
#
# Add `--ask-vault-pass` (or --vault-password-file) when a vault.yml is present.
# ─────────────────────────────────────────────────────────────
- name: Deploy the monorepo stack via Docker Compose
  hosts: app
  become: true
  gather_facts: true

  roles:
    # Firewall (only 80/443 + SSH), automatic security updates, Docker log limits,
    # time sync. Runs before the deploy tasks. Toggle via host_hardening=false.
    - role: host_hardening
    # Encrypted off-host PostgreSQL backups + monthly restore drill (systemd
    # timers). Toggle via manage_backups=false.
    - role: backup

  tasks:
    # --- Optional encrypted secrets ---------------------------------------
    - name: Load vaulted secrets if present
      ansible.builtin.include_vars: "{{ item }}"
      no_log: true
      loop: "{{ query('fileglob', playbook_dir + '/group_vars/all/vault.yml') + query('fileglob', playbook_dir + '/vault.yml') }}"

    # --- Production preflight (fail before mutating server state) ----------
    # Full secret/placeholder assertions live in preflight.yml (imported here).
    - name: Run production preflight assertions
      ansible.builtin.import_tasks: preflight.yml

    # --- Pre-flight: Docker + Compose plugin ------------------------------
    - name: Ensure the docker CLI is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0

    - name: Ensure the docker compose plugin is available
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false
      failed_when: compose_version.rc != 0

    - name: Ensure the docker daemon is running
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false
      failed_when: docker_info.rc != 0

    # --- Ship the compose/config files (NO git clone on the VPS) ----------
    - name: Ensure the application directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/infra/docker"
        - "{{ app_dir }}/releases"

    - name: Copy compose + runtime config to the host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker/{{ item }}"
        dest: "{{ app_dir }}/infra/docker/{{ item }}"
        mode: "0644"
      loop:
        - docker-compose.yml
        - Caddyfile
        - otel-collector-config.yaml

    # --- Render environment file ------------------------------------------
    - name: Template the runtime .env (0600, root-owned)
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      no_log: true

    # --- Verify signatures of the digests we're about to run --------------
    # Fails closed: if verification is on but cosign is missing, stop (don't
    # silently deploy unverified images). Set verify_image_signatures=false to
    # skip only with a deliberate decision.
    - name: Check whether cosign is available
      ansible.builtin.command: cosign version
      register: cosign_check
      changed_when: false
      failed_when: false
      when: verify_image_signatures | bool

    - name: Fail if signature verification is required but cosign is missing
      ansible.builtin.fail:
        msg: "verify_image_signatures=true but cosign is not installed on the host. Install cosign or set verify_image_signatures=false deliberately."
      when: verify_image_signatures | bool and cosign_check.rc != 0

    - name: Verify cosign signatures for each image digest
      ansible.builtin.command:
        cmd: >-
          cosign verify
          --certificate-oidc-issuer {{ cosign_oidc_issuer }}
          --certificate-identity-regexp {{ cosign_identity_regexp }}
          {{ item }}
      loop:
        - "{{ backend_image }}"
        - "{{ frontend_image }}"
        - "{{ bot_image }}"
      register: cosign_verify
      changed_when: false
      when: verify_image_signatures | bool and cosign_check.rc == 0

    # --- Pull, migrate, run (pull-by-digest; NEVER build on the VPS) ------
    - name: Pull image digests
      ansible.builtin.command:
        cmd: "docker compose -f {{ compose_file }} --env-file .env pull"
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Start database and cache (so migrations have a target)
      ansible.builtin.command:
        cmd: "docker compose -f {{ compose_file }} --env-file .env up -d postgres redis"
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Run database migrations (zen migrate deploy — idempotent)
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_file }} --env-file .env run --rm
          backend pnpm --filter @app/backend db:migrate
        chdir: "{{ app_dir }}"
      register: db_migrate
      changed_when: "'Applying migration' in db_migrate.stdout"

    - name: Bring the full stack up
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_file }} --env-file .env
          {% for p in compose_profiles %}--profile {{ p }} {% endfor %}up -d
        chdir: "{{ app_dir }}"
      changed_when: true

    # --- Post-deploy verification -----------------------------------------
    - name: Wait for the backend to report ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ backend_port }}/health/ready"
        status_code: 200
      register: backend_ready
      retries: 20
      delay: 6
      until: backend_ready.status == 200
      changed_when: false

    # --- Record the release manifest for rollback -------------------------
    - name: Write the deployed release manifest
      ansible.builtin.copy:
        dest: "{{ app_dir }}/releases/{{ repo_version }}.json"
        mode: "0644"
        content: |
          {
            "releaseTag": "{{ repo_version }}",
            "images": {
              "backend": "{{ backend_image }}",
              "frontend": "{{ frontend_image }}",
              "bot": "{{ bot_image }}"
            }
          }

    - name: Update the "current release" pointer (previous kept for rollback)
      ansible.builtin.command:
        cmd: "cp -f releases/{{ repo_version }}.json releases/current.json"
        chdir: "{{ app_dir }}"
      changed_when: true

    # --- Housekeeping -----------------------------------------------------
    - name: Prune dangling images to reclaim disk
      ansible.builtin.command: docker image prune -f
      register: image_prune
      changed_when: "'Total reclaimed space: 0B' not in image_prune.stdout"
