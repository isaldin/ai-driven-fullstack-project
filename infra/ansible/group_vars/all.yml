# ─────────────────────────────────────────────────────────────
# Non-secret deployment defaults (committed to git).
#
# SECRETS DO NOT BELONG HERE. Override the `vault_*` values below from an
# encrypted vault file — see README.md. The `change-me` placeholders let the
# playbook parse and dry-run, but a real deploy must supply real secrets.
# ─────────────────────────────────────────────────────────────

# --- Where and what to deploy ---------------------------------------------
app_dir: /opt/app
repo_url: "https://github.com/your-org/your-repo.git"
# Immutable release ref (the tag the images were built + signed from). The
# production preflight rejects moving branches (main/master/HEAD). Rollback =
# re-run with the previous release tag + its digests.
repo_version: main

# Deployment gate: a REAL production deploy must pass `-e deployment_environment=production`
# so preflight enforces the strict checks (digests, no placeholders, HTTPS, ...).
deployment_environment: dev

# Immutable image digests from the release manifest (…@sha256:…). Set per release.
# The `:local` fallbacks let a dev inventory reference the base compose without a
# release; production preflight requires real digests.
registry: "ghcr.io/your-org/your-repo"
backend_image: "{{ registry }}/backend:local"
frontend_image: "{{ registry }}/frontend:local"
bot_image: "{{ registry }}/telegram-bot:local"

# Verify cosign signatures on the host before running (fails closed if cosign is
# absent — see docs/runbooks/ROLLBACK.md). Identity regexp matches this repo's
# release workflow OIDC identity.
verify_image_signatures: true
cosign_oidc_issuer: "https://token.actions.githubusercontent.com"
cosign_identity_regexp: "https://github.com/your-org/your-repo/.github/workflows/release.yml@.*"

compose_file: infra/docker/docker-compose.yml
# `edge` starts the Caddy reverse proxy (TLS). Add "observability" to also run
# the OpenTelemetry Collector + OpenObserve.
compose_profiles: ["edge"] # e.g. ["edge", "observability"]

# --- Non-secret runtime config (baked into the target .env) ---------------
node_env: production
# The stack runs as sibling containers reachable by service name, so the app
# config validator forbids localhost in DB/Redis/CORS/cookie under production.
deployment_mode: compose
backend_port: 3000
frontend_port: 8080

postgres_user: app
postgres_db: app
postgres_port: 5432
redis_port: 6379

# Public-facing origins — set these to your real domains.
cors_origin: "https://app.example.com"
cookie_domain: "example.com"
vite_api_url: "https://api.example.com"
backend_url: "http://backend:3000" # in-network service address for the bot

# Reverse proxy / TLS (Caddy edge). Set to your real domains + ACME contact.
app_domain: "app.example.com"
api_domain: "api.example.com"
observe_domain: "observe.example.com"
acme_email: "admin@example.com"
# "true" only if browser (RUM) tracing is enabled — exposes a locked-down /otlp path.
enable_browser_otlp: ""

# Observability (app -> OTel Collector -> OpenObserve). Disabled by default. Enable by setting
# compose_profiles: ["observability"] above AND otel_sdk_disabled: "false". The app pushes OTLP to the
# collector (the single egress; it holds the OpenObserve credentials) — NOT to OpenObserve directly.
log_level: info
# Leave empty so Compose assigns per-service names (app-backend / app-telegram-bot); a value here
# collapses every service to one name in traces, which hurts cross-service error inspection.
otel_service_name: ""
otel_sdk_disabled: "true"
otel_exporter_otlp_endpoint: "http://otel-collector:4318"
otel_exporter_otlp_headers: ""
metrics_exporter: otlp

# --- Secrets: OVERRIDE these from an encrypted vault ----------------------
# (kept here as placeholders only so the template is self-documenting)
vault_postgres_password: "change-me"
vault_database_url: "postgresql://app:change-me@postgres:5432/app"
vault_jwt_access_secret: "change-me-access-secret-min-32-chars-long"
vault_service_api_token: "change-me-service-token"
vault_telegram_bot_token: "000000:replace-with-botfather-token"
vault_redis_url: "redis://redis:6379"
vault_sentry_dsn: ""
vault_openobserve_email: "admin@example.com"
vault_openobserve_password: "change-me"
