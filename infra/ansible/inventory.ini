# Ansible inventory for VPS deployment.
# Replace the placeholder host/user with your server's details, or pass a
# different inventory with `-i`. Group `app` is what deploy.yml targets.

[app]
# vps-1 ansible_host=203.0.113.10 ansible_user=deploy
vps-1 ansible_host=CHANGE_ME_HOST_OR_IP ansible_user=deploy

[app:vars]
ansible_python_interpreter=/usr/bin/python3
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
