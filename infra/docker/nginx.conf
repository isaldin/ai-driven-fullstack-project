# SPA server (non-root nginx-unprivileged, listens on 8080). Static assets with
# long-cache; everything else falls back to index.html for client-side routing.
# TLS + HSTS are terminated at Caddy in front of this; the headers here are the
# response-level ones that belong with the app content.
#
# NOTE: nginx does NOT inherit a parent block's `add_header` into a child
# `location` that declares its own `add_header`. Because /assets/ and index.html
# set their own Cache-Control, the security headers are repeated in each place
# (via the `security_headers` map below is not possible in http{} we don't own),
# so they are duplicated explicitly to guarantee they appear on every response.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "public, immutable" always;
        expires    1y;
        try_files  $uri =404;
    }

    # The app shell — never cached, so new deploys are picked up immediately.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback: unknown paths return the app shell (which re-matches the
    # index.html location above, so its headers apply).
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
