# SPA server: static assets with long-cache, everything else falls back to
# index.html so client-side routing (vue-router history mode) works on refresh.
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: unknown paths return the app shell, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
