# ─────────────────────────────────────────────────────────────
# PRODUCTION base stack (single-VPS profile).
#
# This file is production-hardened by default:
#   - only Caddy publishes host ports (80/443); everything else uses `expose`;
#   - Postgres/Redis are NOT published to the host at all;
#   - three segmented networks (edge / app_internal / observability_internal),
#     the two internal ones marked `internal: true` (no direct egress);
#   - every stateless container: non-root, cap_drop ALL, no-new-privileges,
#     tmpfs, pinned image, resource + PID limits, bounded json-file logging;
#   - NODE_ENV=production + DEPLOYMENT_MODE=compose, so @app/config rejects
#     placeholders / localhost.
#
# For LOCAL development, layer the dev override, which republishes ports, builds
# locally, disables Caddy and relaxes NODE_ENV back to development:
#   docker compose -f infra/docker/docker-compose.yml \
#                  -f infra/docker/docker-compose.dev.yml up -d --build
#
# For PRODUCTION, Ansible renders a container-oriented .env (real secrets +
# service-name hosts) and runs `--env-file .env --profile edge up -d`
# (add `--profile observability` for telemetry). See infra/ansible/deploy.yml.
#
# Image references: this base BUILDS from source by default so a fresh clone runs.
# A real release pins immutable digests via the release manifest overlay
# (infra/docker/docker-compose.release.yml) — see docs/runbooks/ROLLBACK.md.
# ─────────────────────────────────────────────────────────────

name: app

# Shared bounded logging so a chatty container can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Baseline hardening for stateless services.
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  init: true
  stop_grace_period: 20s

networks:
  # Public routing plane + the only place with host-published ports (Caddy).
  edge:
    driver: bridge
  # Application data plane. internal:true => no route to the internet. Postgres
  # and Redis live ONLY here, so the frontend (edge only) cannot reach them.
  app_internal:
    driver: bridge
    internal: true
  # Telemetry data plane. Collector + OpenObserve live ONLY here.
  observability_internal:
    driver: bridge
    internal: true

services:
  # ---- Reverse proxy / TLS (public edge) -----------------------------------
  # Automatic ACME certificates + HTTP->HTTPS + security headers. Only enabled
  # with the `edge` profile (prod); local dev talks to services directly.
  caddy:
    image: caddy:2.10-alpine
    profiles: ["edge"]
    restart: unless-stopped
    <<: *hardening
    # Caddy binds 80/443 as non-root via the one capability it needs.
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.example.com}
      API_DOMAIN: ${API_DOMAIN:-api.example.com}
      OBSERVE_DOMAIN: ${OBSERVE_DOMAIN:-observe.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      # Public browser OTLP: leave empty to keep the collector fully internal.
      ENABLE_BROWSER_OTLP: ${ENABLE_BROWSER_OTLP:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - edge
      - observability_internal
    depends_on:
      - frontend
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 200

  # ---- Postgres ------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No published ports in production: reachable only over app_internal by name.
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200

  # ---- Redis ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "exec redis-server --appendonly yes $${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"}"]
    volumes:
      - redis_data:/data
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 100

  # ---- Backend (NestJS API) ------------------------------------------------
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    image: ${BACKEND_IMAGE:-app-backend:local}
    restart: unless-stopped
    <<: *hardening
    # read_only is intentionally OFF for the backend: the boot command runs
    # `zen migrate deploy` (Prisma migration engine + pnpm) which writes temp
    # state. Documented exception — see docs/runbooks/HOST_HARDENING.md. All
    # other hardening still applies.
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-compose}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/app}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars-long}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:-change-me-service-token}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-app-backend}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_VERBOSE_SPANS: ${OTEL_VERBOSE_SPANS:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      METRICS_EXPORTER: ${METRICS_EXPORTER:-otlp}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: >
      sh -c "pnpm --filter @app/backend db:migrate && node apps/backend/dist/main.js"
    # No host ports in production: Caddy reaches the backend over `edge` by name.
    expose:
      - "3000"
    networks:
      - edge
      - app_internal
      - observability_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+(process.env.BACKEND_PORT||3000)+'/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
          pids: 300

  # ---- Frontend (static SPA via non-root nginx) ----------------------------
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: ${FRONTEND_IMAGE:-app-frontend:local}
    restart: unless-stopped
    <<: *hardening
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    # nginx-unprivileged listens on 8080 as non-root. Caddy routes here over edge.
    expose:
      - "8080"
    networks:
      - edge
    depends_on:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
          pids: 100

  # ---- Telegram bot (long-polling worker) ----------------------------------
  telegram-bot:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.bot
    image: ${BOT_IMAGE:-app-telegram-bot:local}
    restart: unless-stopped
    <<: *hardening
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - path: ../../.env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-compose}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-000000:replace-with-botfather-token}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:-change-me-service-token}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-app-telegram-bot}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    # edge -> Telegram egress; app_internal -> backend + redis; observability_internal -> collector.
    networks:
      - edge
      - app_internal
      - observability_internal
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 200

  # ---- OpenObserve (optional OTLP backend) ---------------------------------
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.14.7
    profiles: ["observability"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-admin@example.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-ChangeMe123!}
      ZO_DATA_DIR: /data
    volumes:
      - openobserve_data:/data
    # No published port in production: reachable via Caddy (observe.DOMAIN) only.
    expose:
      - "5080"
    networks:
      - observability_internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 200

  # ---- OpenTelemetry Collector (single OTLP egress + log tailer) ------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    profiles: ["observability"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Root so the filelog receiver can read the (root-owned) Docker container logs.
    user: "0:0"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      OPENOBSERVE_AUTH_HEADER: ${OPENOBSERVE_AUTH_HEADER:-Basic YWRtaW5AZXhhbXBsZS5jb206Q2hhbmdlTWUxMjMh}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    # No published OTLP port in production: browser OTLP (if enabled) goes through
    # Caddy's rate-limited /otlp endpoint; app services reach it over the network.
    expose:
      - "4318"
    networks:
      - observability_internal
    depends_on:
      openobserve:
        condition: service_started
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 200

volumes:
  postgres_data:
  redis_data:
  openobserve_data:
  caddy_data:
  caddy_config:
